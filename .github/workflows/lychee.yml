name: Check links

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'lychee.toml'
  pull_request:
    branches: [main]
    paths:
      - 'README.md'
      - 'lychee.toml'
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check links with lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --config ./lychee.toml
            --no-progress
            README.md
          fail: false
          jobSummary: true
          format: markdown
          output: ./lychee/report.md
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue for broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Broken links found in README
          content-filepath: ./lychee/report.md
          labels: |
            broken-links
            automated
